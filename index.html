<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Arbeitsplan</title>

    <!-- PWA manifest -->
    <link rel="manifest" href="manifest.json">

    <!-- iOS Safari PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Arbeitsplan">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">

    <!-- Theme colour for browser chrome -->
    <meta name="theme-color" content="#007bff">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 0.5rem;
            padding-left: max(0.5rem, env(safe-area-inset-left));
            padding-right: max(0.5rem, env(safe-area-inset-right));
            padding-bottom: max(0.5rem, env(safe-area-inset-bottom));
            margin: 0 auto;
            background: #f5f5f5;
            font-size: 0.9rem;
        }

        .upload-area {
            text-align: center;
            margin-bottom: 1rem;
        }

        input[type="file"] {
            display: none;
        }

        .btn {
            display: inline-block;
            padding: 0.6rem 1.2rem;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
            width: 100%;
            max-width: 300px;
        }

        .btn:hover {
            background: #0056b3;
        }

        .btn:active {
            transform: scale(0.98);
        }

        #loading {
            display: none;
            text-align: center;
            padding: 0.5rem;
            color: #666;
            font-size: 0.85rem;
        }

        #results {
            background: white;
            border-radius: 4px;
            padding: 0.75rem;
            display: none;
        }

        h2, h3 {
            font-size: 1rem;
            margin: 0.5rem 0;
            font-weight: 600;
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            margin-top: 0.5rem;
            font-size: 0.85rem;
        }

        th, td {
            padding: 0.4rem 0;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        th:first-child, td:first-child {
            text-align: right;
            padding-left: 0.4rem;
        }

        th:not(:last-child), td:not(:last-child) {
            width: 1%;
            white-space: nowrap;
            padding-right: 0.75rem;
        }

        th {
            background: #f8f9fa;
            font-weight: 600;
            color: #333;
            font-size: 0.8rem;
        }

        tr:hover {
            background: #f8f9fa;
        }

        .error {
            background: #fee;
            border: 1px solid #fcc;
            color: #c33;
            padding: 1rem;
            border-radius: 4px;
            margin-bottom: 1rem;
        }

        pre {
            background: #f4f4f4;
            padding: 0.5rem;
            border-radius: 4px;
            overflow-x: auto;
            margin-top: 0.5rem;
            font-size: 0.75rem;
            line-height: 1.3;
        }

        p {
            margin: 0.3rem 0;
            font-size: 0.85rem;
        }

        .copy-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.4rem 0.8rem;
            background: #5b9fd4;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            margin-top: 0.25rem;
        }

        .copy-btn:hover {
            background: #4a8ec4;
        }

        .copy-btn:active {
            transform: scale(0.98);
        }

        .copy-btn.copied {
            background: #6c757d;
        }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        .upload-icon-btn {
            background: none;
            border: 1px solid #dee2e6;
            border-radius: 4px;
            cursor: pointer;
            padding: 0.3rem;
            color: #6c757d;
            display: flex;
            align-items: center;
        }

        .upload-icon-btn:hover {
            background: #f8f9fa;
            color: #343a40;
        }

        .past-separator td {
            background: #d0d4d9;
            padding: 0.35rem 0.4rem;
            border-top: 1px solid #dee2e6;
            border-left: 1px solid #dee2e6;
            border-right: 1px solid #dee2e6;
            border-bottom: 1px solid #dee2e6;
            border-top-left-radius: 6px;
            border-top-right-radius: 6px;
        }

        .past-separator-inner {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .past-separator-label {
            color: #6c757d;
            font-size: 0.8rem;
        }

        .toggle-past-link {
            color: #6c757d;
            font-size: 0.85rem;
            line-height: 1;
        }

        tr.past-day td {
            max-height: 0;
            padding-top: 0;
            padding-bottom: 0;
            line-height: 0;
            overflow: hidden;
            opacity: 0;
            border: none;
            transition: max-height 0.25s ease, padding 0.25s ease, opacity 0.25s ease, line-height 0.25s ease;
        }

        tr.past-day.show td {
            max-height: 3rem;
            padding-top: 0.4rem;
            padding-bottom: 0.4rem;
            line-height: 1.4;
            opacity: 1;
            background: #e9ecef;
            border-bottom: 1px solid #dee2e6;
        }

        tr.past-day.show td:first-child { border-left: 1px solid #dee2e6; }
        tr.past-day.show td:last-child  { border-right: 1px solid #dee2e6; }

        /* no top border on first past row — separator row is the top of the box */
        tr.past-separator + tr.past-day.show td { border-top: none; }

        /* when collapsed, round the bottom corners of the separator too */
        tr.past-separator:not(:has(+ tr.past-day.show)) td {
            border-bottom-left-radius: 6px;
            border-bottom-right-radius: 6px;
        }

        /* rounded bottom corners on last past row */
        tr.past-day.show:not(:has(+ tr.past-day.show)) td:first-child { border-bottom-left-radius: 6px; }
        tr.past-day.show:not(:has(+ tr.past-day.show)) td:last-child  { border-bottom-right-radius: 6px; }

        tr.filler-row td {
            color: #bbb;
            font-size: 0.8rem;
            background: #f5f5f5;
        }

        tr.filler-row:hover td {
            background: #f5f5f5;
        }

        .toggle-pill {
            display: inline-flex;
            border: 1px solid #dee2e6;
            border-radius: 5px;
            overflow: hidden;
            font-size: 0.78rem;
            cursor: pointer;
        }

        .toggle-pill span {
            padding: 0.2rem 0.65rem;
            color: #999;
            transition: background 0.15s, color 0.15s;
            user-select: none;
        }

        .toggle-pill span.active {
            background: #495057;
            color: white;
        }

        .next-shift-banner {
            background: #e9ecef;
            border-radius: 8px;
            padding: 0.4rem 0.75rem;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
            color: #495057;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .alarm-shortcut-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 0.15rem;
            color: #6c757d;
            display: flex;
            align-items: center;
            flex-shrink: 0;
        }

        .alarm-shortcut-btn:hover {
            color: #343a40;
        }

        .alarm-offset-input {
            width: 4rem;
            padding: 0.25rem 0.4rem;
            border: 1px solid #dee2e6;
            border-radius: 4px;
            font-size: 0.85rem;
            text-align: center;
            color: #333;
        }

        .alarm-offset-row {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.35rem;
        }

        .alarm-offset-remove {
            background: none;
            border: 1px solid #dee2e6;
            border-radius: 4px;
            cursor: pointer;
            padding: 0.15rem 0.45rem;
            color: #6c757d;
            font-size: 0.85rem;
            line-height: 1.4;
        }

        .alarm-offset-remove:hover {
            background: #fee;
            border-color: #fcc;
            color: #c33;
        }

        .alarm-offset-add {
            background: none;
            border: 1px solid #dee2e6;
            border-radius: 4px;
            cursor: pointer;
            padding: 0.25rem 0.65rem;
            color: #495057;
            font-size: 0.82rem;
            margin-top: 0.15rem;
        }

        .alarm-offset-add:hover {
            background: #f8f9fa;
        }

    </style>
</head>
<body>
    <div class="upload-area" id="uploadArea">
        <input type="file" id="fileInput" accept=".pdf">
        <button class="btn" onclick="document.getElementById('fileInput').click()">PDF hochladen</button>
    </div>

    <div id="loading">Wird verarbeitet...</div>

    <div id="error"></div>

    <div id="results">
        <div id="output"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        // Configure PDF.js worker
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const loading = document.getElementById('loading');
        const resultsDiv = document.getElementById('results');
        const outputDiv = document.getElementById('output');
        const errorDiv = document.getElementById('error');

        // Load saved results on page load
        window.addEventListener('DOMContentLoaded', () => {
            loadSavedResults();
        });

        // Drag and drop handlers

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });

        async function handleFile(file) {
            errorDiv.innerHTML = '';
            resultsDiv.style.display = 'none';
            loading.style.display = 'block';

            try {
                const arrayBuffer = await file.arrayBuffer();
                const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;

                const allLines = [];

                // Extract text from all pages
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const textContent = await page.getTextContent();

                    // Group items by line (y-coordinate)
                    const lines = {};
                    textContent.items.forEach(item => {
                        const y = Math.round(item.transform[5]);
                        if (!lines[y]) {
                            lines[y] = [];
                        }
                        lines[y].push({
                            x: item.transform[4],
                            text: item.str
                        });
                    });

                    // Sort lines by y-coordinate (top to bottom)
                    const sortedY = Object.keys(lines).sort((a, b) => b - a);

                    // Collect structured lines preserving x positions
                    for (const y of sortedY) {
                        // Sort items in line by x-coordinate (left to right)
                        lines[y].sort((a, b) => a.x - b.x);
                        allLines.push(lines[y]);
                    }
                }

                // Process the structured lines (grep for "Anwesenheitszeit")
                const data = processText(allLines);
                displayResults(data);
                saveResults(data);

            } catch (error) {
                showError('Fehler beim Verarbeiten der PDF: ' + error.message);
            } finally {
                loading.style.display = 'none';
            }
        }

        function processText(allLines) {
            const matches = [];
            let month = null;

            // Pass 1 — find x-position of "Pause" column header
            let pauseColX = null;
            for (const lineItems of allLines) {
                const pauseItem = lineItems.find(item => item.text === 'Pause');
                if (pauseItem) { pauseColX = pauseItem.x; break; }
            }

            // Pass 2 — extract data
            for (const lineItems of allLines) {
                const line = lineItems.map(i => i.text).join(' ');

                if (line.includes('von:') && line.includes('bis:')) {
                    const vonMatch = line.match(/von:\s*(\d{2}\.\d{2}\.\d{4})/);
                    if (vonMatch) {
                        const dateStr = vonMatch[1]; // e.g., "01.03.2026"
                        const parts = dateStr.split('.');
                        if (parts.length === 3) {
                            const monthNum = parseInt(parts[1], 10);
                            const year = parts[2];
                            const monthNames = ['Januar', 'Februar', 'März', 'April', 'Mai', 'Juni',
                                              'Juli', 'August', 'September', 'Oktober', 'November', 'Dezember'];
                            month = `${monthNames[monthNum - 1]} ${year}`;
                        }
                    }
                }

                if (line.includes('Anwesenheitszeit')) {
                    // Split by whitespace and filter empty strings
                    const fields = line.trim().split(/\s+/).filter(f => f);

                    // Fields: [0]=day, [1]=weekday, [2]="Anwesenheitszeit", [3]="(final)", [4]=von, [5]=bis
                    // Then: numeric fields (Anw, Pause, Istzt, SpätZ, MAZ, Gesamt, Na/So/Ft)
                    // Then: Kommentar (non-numeric, rest of line)
                    if (fields.length >= 6) {
                        const isNumericField = (f) => /^\d+[,]\d+$/.test(f);
                        let i = 6;
                        while (i < fields.length && isNumericField(fields[i])) i++;
                        const kommentar = fields.slice(i).join(' ');

                        // Use x-coordinate matching for Pause to avoid wrong index when break is absent
                        const pauseItem = pauseColX !== null
                            ? lineItems.find(item => item.text.trim() !== '' && Math.abs(item.x - pauseColX) < 25)
                            : null;
                        const pause = pauseItem ? pauseItem.text : '';

                        matches.push({
                            field1: fields[0],
                            field2: fields[1],
                            field5: fields[4],
                            field6: fields[5],
                            arbeitszeit: fields[6] || '',  // Duration (Anw)
                            pause: pause,
                            kommentar: kommentar,
                            fullLine: line
                        });
                    }
                }
            }

            return { matches, month };
        }

        function displayResults(data) {
            resultsDiv.style.display = 'block';
            uploadArea.style.display = 'none';

            const results = data.matches || data.results || data;
            const month = data.month || null;
            const timestamp = data.timestamp || null;

            if (!results || results.length === 0) {
                outputDiv.innerHTML = '<p>Keine Einträge gefunden</p>';
                return;
            }

            const today = new Date();
            today.setHours(0, 0, 0, 0);

            let html = '';
            html += '<div class="header-row">';
            if (month) {
                let monthText = escapeHtml(month);
                if (timestamp) {
                    const date = new Date(timestamp);
                    const day = String(date.getDate()).padStart(2, '0');
                    const monthNum = String(date.getMonth() + 1).padStart(2, '0');
                    monthText += ` <span style="font-weight: normal; font-size: 0.85rem; color: #666;">(hochgeladen am ${day}.${monthNum}.)</span>`;
                }
                html += `<h3 style="margin: 0;">${monthText}</h3>`;
            } else {
                html += `<h3 style="margin: 0;">Arbeitsplan</h3>`;
            }
            html += `<button class="upload-icon-btn" onclick="document.getElementById('fileInput').click()" title="PDF hochladen"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg></button>`;
            html += '</div>';

            // Extract year and month number from month string (e.g. "März 2026")
            const monthNames = ['Januar', 'Februar', 'März', 'April', 'Mai', 'Juni',
                              'Juli', 'August', 'September', 'Oktober', 'November', 'Dezember'];
            let pdfYear = today.getFullYear();
            let pdfMonthNum = today.getMonth() + 1;
            if (month) {
                const yearMatch = month.match(/\d{4}/);
                if (yearMatch) pdfYear = parseInt(yearMatch[0], 10);
                const monthName = month.replace(/\s*\d{4}$/, '').trim();
                const idx = monthNames.indexOf(monthName);
                if (idx !== -1) pdfMonthNum = idx + 1;
            }

            const decimalDauerOn = localStorage.getItem('formatDauer') === 'true';
            const decimalPauseOn = localStorage.getItem('formatPause') === 'true';

            let pastRows = '';
            let futureRows = '';
            let nextShiftStart = null;
            let prevDay = null;
            let prevIsPast = false;

            results.forEach(result => {
                let isPast = false;
                let rowDay = null;
                if (result.field1) {
                    const dateMatch = result.field1.match(/(\d{1,2})/);
                    if (dateMatch) {
                        rowDay = parseInt(dateMatch[1], 10);
                        const rowDate = new Date(pdfYear, pdfMonthNum - 1, rowDay);
                        rowDate.setHours(0, 0, 0, 0);
                        isPast = rowDate < today;
                    }
                }

                // Insert filler row if there's a gap of at least 1 day
                if (rowDay !== null && prevDay !== null && rowDay - prevDay > 1) {
                    const gapDays = rowDay - prevDay - 1;
                    const label = gapDays === 1 ? '1 Tag frei' : `${gapDays} Tage frei`;
                    const fillerRow = `<tr class="${prevIsPast ? 'past-day filler-row' : 'filler-row'}">
                        <td></td><td colspan="6">${label}</td>
                    </tr>`;
                    if (prevIsPast) pastRows += fillerRow;
                    else futureRows += fillerRow;
                }

                if (!isPast && rowDay && result.field5) {
                    const timeMatch = result.field5.match(/(\d{1,2}):(\d{2})/);
                    if (timeMatch && nextShiftStart === null) {
                        const shiftStart = new Date(pdfYear, pdfMonthNum - 1, rowDay,
                            parseInt(timeMatch[1], 10), parseInt(timeMatch[2], 10), 0, 0);
                        if (shiftStart > new Date()) {
                            nextShiftStart = shiftStart;
                        }
                    }
                }

                const row = `<tr class="${isPast ? 'past-day' : ''}">
                    <td>${escapeHtml(result.field1)}</td>
                    <td>${escapeHtml(result.field2)}</td>
                    <td>${escapeHtml(result.field5)}</td>
                    <td>${escapeHtml(result.field6)}</td>
                    <td data-col="dauer" data-raw="${escapeHtml(result.arbeitszeit || '')}">${escapeHtml(decimalDauerOn ? (result.arbeitszeit || '') : decimalToHm(result.arbeitszeit))}</td>
                    <td data-col="pause" data-raw="${escapeHtml(result.pause || '')}">${escapeHtml(decimalPauseOn ? (result.pause || '-') : (result.pause ? decimalToHm(result.pause) : '-'))}</td>
                    <td>${escapeHtml(result.kommentar || '')}</td>
                </tr>`;

                if (isPast) pastRows += row;
                else futureRows += row;

                if (rowDay !== null) {
                    prevDay = rowDay;
                    prevIsPast = isPast;
                }
            });

            const bannerOn = localStorage.getItem('showNextShift') !== 'false';
            if (nextShiftStart) {
                html += `<div class="next-shift-banner" id="next-shift-banner" style="${bannerOn ? '' : 'display:none'}">
                    <span id="next-shift-text"></span>
                    <button class="alarm-shortcut-btn" data-shift-ts="${nextShiftStart.getTime()}" onclick="setShiftAlarm(this)" title="Wecker stellen">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="13" r="8"/><path d="M12 9v4l2 2"/><path d="M5 3 2 6"/><path d="m22 6-3-3"/></svg>
                        Wecker stellen
                    </button>
                </div>`;
            }

            const separator = pastRows
                ? `<tr class="past-separator" onclick="togglePastDays()" style="cursor:pointer;"><td colspan="7"><span class="past-separator-inner"><span class="past-separator-label">vergangene Tage ausgeblendet</span><span class="toggle-past-link">▼</span></span></td></tr>`
                : '';

            html += '<table>';
            html += '<thead><tr><th>Tag</th><th></th><th>Start</th><th>Ende</th><th>Dauer</th><th>Pause</th><th>Info</th></tr></thead>';
            html += '<tbody>';
            html += separator + pastRows + futureRows;
            html += '</tbody></table>';

            // Build plain text for clipboard
            let plainText = '';
            results.forEach(result => {
                const line = `${result.field1} ${result.field2} ${result.field5} ${result.field6} ${result.arbeitszeit || ''} ${result.pause || ''}`;
                plainText += result.kommentar ? `${line} ${result.kommentar}\n` : `${line}\n`;
            });

            html += `<div id="plainText" style="display:none">${escapeHtml(plainText)}</div>`;
            html += '<div style="text-align:center; margin-top:0.75rem;"><button class="copy-btn" onclick="copyToClipboard()"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>Als Text kopieren</button></div>';
            html += '<h3 style="margin-top:1rem;">Einstellungen</h3>';
            html += '<div style="margin-top:0.4rem; font-size:0.85rem; color:#666; display:flex; align-items:center; gap:0.75rem;">';
            const fillerOn = localStorage.getItem('showFillerRows') !== 'false';
            html += '<div class="toggle-pill" onclick="toggleFillerPill(this)">';
            html += `<span class="${fillerOn ? 'active' : ''}">An</span><span class="${fillerOn ? '' : 'active'}">Aus</span>`;
            html += '</div>';
            html += '<span>Zeilen für freie Tage anzeigen</span>';
            html += '</div>';
            html += '<div style="margin-top:0.4rem; font-size:0.85rem; color:#666; display:flex; align-items:center; gap:0.75rem;">';
            const bannerOnSetting = localStorage.getItem('showNextShift') !== 'false';
            html += '<div class="toggle-pill" onclick="toggleBannerPill(this)">';
            html += `<span class="${bannerOnSetting ? 'active' : ''}">An</span><span class="${bannerOnSetting ? '' : 'active'}">Aus</span>`;
            html += '</div>';
            html += '<span>„Nächste Schicht in" anzeigen</span>';
            html += '</div>';
            html += '<div style="margin-top:0.4rem; font-size:0.85rem; color:#666; display:flex; align-items:center; gap:0.75rem;">';
            html += '<div class="toggle-pill" onclick="toggleDauerFormat(this)">';
            html += `<span class="${decimalDauerOn ? 'active' : ''}">An</span><span class="${decimalDauerOn ? '' : 'active'}">Aus</span>`;
            html += '</div>';
            html += '<span>Dauer als Dezimalzahl anzeigen</span>';
            html += '</div>';
            html += '<div style="margin-top:0.4rem; font-size:0.85rem; color:#666; display:flex; align-items:center; gap:0.75rem;">';
            html += '<div class="toggle-pill" onclick="togglePauseFormat(this)">';
            html += `<span class="${decimalPauseOn ? 'active' : ''}">An</span><span class="${decimalPauseOn ? '' : 'active'}">Aus</span>`;
            html += '</div>';
            html += '<span>Pause als Dezimalzahl anzeigen</span>';
            html += '</div>';

            // Alarm offsets section
            html += '<div style="margin-top:1rem; font-size:0.85rem; font-weight:600; color:#333;">Alarm-Zeiten</div>';
            html += '<div style="font-size:0.82rem; color:#888; margin-top:0.1rem; margin-bottom:0.4rem;">Minuten vor Schichtbeginn</div>';
            html += '<div id="alarm-offsets-list">';
            const alarmOffsets = getAlarmOffsets();
            alarmOffsets.forEach(offset => {
                html += `<div class="alarm-offset-row">
                    <input type="number" min="1" max="1440" value="${offset}" class="alarm-offset-input" onchange="saveAlarmOffsetsFromUI()">
                    <span style="font-size:0.82rem; color:#666;">min vorher</span>
                    <button class="alarm-offset-remove" onclick="removeAlarmOffset(this)" title="Entfernen">×</button>
                </div>`;
            });
            html += '</div>';
            html += '<button class="alarm-offset-add" onclick="addAlarmOffset()">+ Hinzufügen</button>';

            outputDiv.innerHTML = html;

            if (localStorage.getItem('showFillerRows') === 'false') {
                document.querySelectorAll('tr.filler-row').forEach(row => row.style.display = 'none');
            }

            if (nextShiftStart) startCountdownTimer(nextShiftStart);
        }

        let countdownInterval = null;

        function startCountdownTimer(shiftStart) {
            if (countdownInterval) clearInterval(countdownInterval);
            updateCountdownPill(shiftStart);
            countdownInterval = setInterval(() => updateCountdownPill(shiftStart), 30000);
        }

        function updateCountdownPill(shiftStart) {
            const banner = document.getElementById('next-shift-banner');
            if (!banner) { clearInterval(countdownInterval); return; }
            const textEl = document.getElementById('next-shift-text');
            if (!textEl) return;
            const ms = shiftStart - Date.now();
            textEl.textContent = ms <= 0 ? 'Nächste Schicht: jetzt' : `Nächste Schicht ${formatCountdown(ms)}`;
        }

        function getAlarmOffsets() {
            try {
                const saved = localStorage.getItem('alarmOffsets');
                if (saved) {
                    const parsed = JSON.parse(saved);
                    if (Array.isArray(parsed) && parsed.length > 0) return parsed;
                }
            } catch (e) {}
            return [30];
        }

        function saveAlarmOffsetsFromUI() {
            const inputs = document.querySelectorAll('#alarm-offsets-list .alarm-offset-input');
            const offsets = Array.from(inputs)
                .map(i => parseInt(i.value, 10))
                .filter(v => !isNaN(v) && v > 0);
            localStorage.setItem('alarmOffsets', JSON.stringify(offsets));
        }

        function addAlarmOffset() {
            const list = document.getElementById('alarm-offsets-list');
            const inputs = list.querySelectorAll('.alarm-offset-input');
            const lastVal = inputs.length > 0 ? parseInt(inputs[inputs.length - 1].value, 10) : 15;
            const newVal = (isNaN(lastVal) ? 15 : lastVal) + 15;
            const div = document.createElement('div');
            div.className = 'alarm-offset-row';
            div.innerHTML = `<input type="number" min="1" max="1440" value="${newVal}" class="alarm-offset-input" onchange="saveAlarmOffsetsFromUI()">
                <span style="font-size:0.82rem; color:#666;">min vorher</span>
                <button class="alarm-offset-remove" onclick="removeAlarmOffset(this)" title="Entfernen">×</button>`;
            list.appendChild(div);
            saveAlarmOffsetsFromUI();
        }

        function removeAlarmOffset(btn) {
            btn.closest('.alarm-offset-row').remove();
            saveAlarmOffsetsFromUI();
        }

        function setShiftAlarm(btn) {
            const shiftTs = parseInt(btn.dataset.shiftTs);
            const offsets = getAlarmOffsets();
            const times = offsets.map(offset => {
                const alarmTime = new Date(shiftTs - offset * 60 * 1000);
                const hh = String(alarmTime.getHours()).padStart(2, '0');
                const mm = String(alarmTime.getMinutes()).padStart(2, '0');
                return hh + ':' + mm;
            });
            window.location.href = `shortcuts://run-shortcut?name=PWA%20Alarm&input=text&text=${encodeURIComponent(times.join(','))}`;
        }

        function formatCountdown(ms) {
            const totalMinutes = Math.floor(ms / 60000);
            const days = Math.floor(totalMinutes / 1440);
            const hours = Math.floor((totalMinutes % 1440) / 60);
            const mins = totalMinutes % 60;
            if (days >= 1) {
                const half = hours >= 12 ? 0.5 : 0;
                const total = days + half;
                return total === 1 ? 'in 1 Tag' : `in ${total} Tagen`;
            }
            if (hours > 0) return `in ${hours}h ${mins}m`;
            return `in ${mins}m`;
        }

        function copyToClipboard() {
            const plainText = document.getElementById('plainText').textContent;
            navigator.clipboard.writeText(plainText).then(() => {
                const btn = document.querySelector('.copy-btn');
                const originalText = btn.textContent;
                btn.textContent = 'Kopiert!';
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.textContent = originalText;
                    btn.classList.remove('copied');
                }, 2000);
            }).catch(err => {
                console.error('Fehler beim Kopieren:', err);
                alert('Fehler beim Kopieren in die Zwischenablage');
            });
        }

        function decimalToHm(val) {
            if (!val || val === '-') return val || '-';
            const num = parseFloat(val.replace(',', '.'));
            if (isNaN(num)) return val;
            const h = Math.floor(num);
            const m = Math.round((num - h) * 60);
            if (h > 0 && m > 0) return `${h}h${m}m`;
            if (h > 0) return `${h}h`;
            if (m > 0) return `${m}m`;
            return val;
        }

        function toggleDauerFormat(pill) {
            const [on, off] = pill.querySelectorAll('span');
            const isOn = on.classList.contains('active');
            on.classList.toggle('active', !isOn);
            off.classList.toggle('active', isOn);
            localStorage.setItem('formatDauer', isOn ? 'false' : 'true');
            document.querySelectorAll('td[data-col="dauer"]').forEach(td => {
                td.textContent = !isOn ? (td.dataset.raw || '') : decimalToHm(td.dataset.raw);
            });
        }

        function togglePauseFormat(pill) {
            const [on, off] = pill.querySelectorAll('span');
            const isOn = on.classList.contains('active');
            on.classList.toggle('active', !isOn);
            off.classList.toggle('active', isOn);
            localStorage.setItem('formatPause', isOn ? 'false' : 'true');
            document.querySelectorAll('td[data-col="pause"]').forEach(td => {
                td.textContent = !isOn ? (td.dataset.raw || '-') : (td.dataset.raw ? decimalToHm(td.dataset.raw) : '-');
            });
        }

        function toggleFillerPill(pill) {
            const [on, off] = pill.querySelectorAll('span');
            const isOn = on.classList.contains('active');
            on.classList.toggle('active', !isOn);
            off.classList.toggle('active', isOn);
            document.querySelectorAll('tr.filler-row').forEach(row => {
                row.style.display = isOn ? 'none' : '';
            });
            localStorage.setItem('showFillerRows', isOn ? 'false' : 'true');
        }

        function toggleBannerPill(pill) {
            const [on, off] = pill.querySelectorAll('span');
            const isOn = on.classList.contains('active');
            on.classList.toggle('active', !isOn);
            off.classList.toggle('active', isOn);
            const banner = document.getElementById('next-shift-banner');
            if (banner) banner.style.display = isOn ? 'none' : '';
            localStorage.setItem('showNextShift', isOn ? 'false' : 'true');
        }

        function togglePastDays() {
            const pastRows = document.querySelectorAll('tr.past-day');
            const btn = document.querySelector('.toggle-past-link');
            const label = document.querySelector('.past-separator-label');
            const isShowing = pastRows.length > 0 && pastRows[0].classList.contains('show');

            pastRows.forEach(row => row.classList.toggle('show', !isShowing));
            btn.textContent = isShowing ? '▼' : '▲';
            label.textContent = isShowing ? 'vergangene Tage ausgeblendet' : 'vergangene Tage';
        }

        function saveResults(data) {
            try {
                const savedData = {
                    matches: data.matches || data.results || data,
                    month: data.month || null,
                    timestamp: new Date().toISOString()
                };
                localStorage.setItem('anwesenheitszeit_results', JSON.stringify(savedData));
            } catch (error) {
                console.error('Fehler beim Speichern der Ergebnisse:', error);
            }
        }

        function loadSavedResults() {
            try {
                const saved = localStorage.getItem('anwesenheitszeit_results');
                if (saved) {
                    const data = JSON.parse(saved);
                    displayResults(data);
                }
            } catch (error) {
                console.error('Fehler beim Laden der Ergebnisse:', error);
            }
        }

        function showError(message) {
            errorDiv.innerHTML = `<div class="error">${escapeHtml(message)}</div>`;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Register service worker for PWA / offline support
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(() => {});
            });
        }
    </script>
</body>
</html>
