<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arbeitsplan</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 0.5rem;
            margin: 0 auto;
            background: #f5f5f5;
            font-size: 0.9rem;
        }

        .upload-area {
            text-align: center;
            margin-bottom: 1rem;
        }

        input[type="file"] {
            display: none;
        }

        .btn {
            display: inline-block;
            padding: 0.6rem 1.2rem;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
            width: 100%;
            max-width: 300px;
        }

        .btn:hover {
            background: #0056b3;
        }

        .btn:active {
            transform: scale(0.98);
        }

        #loading {
            display: none;
            text-align: center;
            padding: 0.5rem;
            color: #666;
            font-size: 0.85rem;
        }

        #results {
            background: white;
            border-radius: 4px;
            padding: 0.75rem;
            display: none;
        }

        h2, h3 {
            font-size: 1rem;
            margin: 0.5rem 0;
            font-weight: 600;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 0.5rem;
            font-size: 0.85rem;
        }

        th, td {
            padding: 0.4rem;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        th {
            background: #f8f9fa;
            font-weight: 600;
            color: #333;
            font-size: 0.8rem;
        }

        tr:hover {
            background: #f8f9fa;
        }

        .error {
            background: #fee;
            border: 1px solid #fcc;
            color: #c33;
            padding: 1rem;
            border-radius: 4px;
            margin-bottom: 1rem;
        }

        pre {
            background: #f4f4f4;
            padding: 0.5rem;
            border-radius: 4px;
            overflow-x: auto;
            margin-top: 0.5rem;
            font-size: 0.75rem;
            line-height: 1.3;
        }

        p {
            margin: 0.3rem 0;
            font-size: 0.85rem;
        }

        .copy-btn {
            display: inline-block;
            padding: 0.4rem 0.8rem;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            margin-top: 0.25rem;
        }

        .copy-btn:hover {
            background: #218838;
        }

        .copy-btn:active {
            transform: scale(0.98);
        }

        .copy-btn.copied {
            background: #6c757d;
        }
    </style>
</head>
<body>
    <div class="upload-area" id="uploadArea">
        <input type="file" id="fileInput" accept=".pdf">
        <button class="btn" onclick="document.getElementById('fileInput').click()">PDF hochladen</button>
    </div>

    <div id="loading">Wird verarbeitet...</div>

    <div id="error"></div>

    <div id="results">
        <div id="output"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        // Configure PDF.js worker
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const loading = document.getElementById('loading');
        const resultsDiv = document.getElementById('results');
        const outputDiv = document.getElementById('output');
        const errorDiv = document.getElementById('error');

        // Load saved results on page load
        window.addEventListener('DOMContentLoaded', () => {
            loadSavedResults();
        });

        // Drag and drop handlers

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });

        async function handleFile(file) {
            errorDiv.innerHTML = '';
            resultsDiv.style.display = 'none';
            loading.style.display = 'block';

            try {
                const arrayBuffer = await file.arrayBuffer();
                const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;

                let allText = '';

                // Extract text from all pages
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const textContent = await page.getTextContent();

                    // Group items by line (y-coordinate)
                    const lines = {};
                    textContent.items.forEach(item => {
                        const y = Math.round(item.transform[5]);
                        if (!lines[y]) {
                            lines[y] = [];
                        }
                        lines[y].push({
                            x: item.transform[4],
                            text: item.str
                        });
                    });

                    // Sort lines by y-coordinate (top to bottom)
                    const sortedY = Object.keys(lines).sort((a, b) => b - a);

                    // Build text with layout
                    for (const y of sortedY) {
                        // Sort items in line by x-coordinate (left to right)
                        lines[y].sort((a, b) => a.x - b.x);
                        const lineText = lines[y].map(item => item.text).join(' ');
                        allText += lineText + '\n';
                    }
                }

                // Process the text (grep for "Anwesenheitszeit")
                const results = processText(allText);
                displayResults(results);
                saveResults(results);

            } catch (error) {
                showError('Fehler beim Verarbeiten der PDF: ' + error.message);
            } finally {
                loading.style.display = 'none';
            }
        }

        function processText(text) {
            const lines = text.split('\n');
            const matches = [];

            lines.forEach(line => {
                if (line.includes('Anwesenheitszeit')) {
                    // Split by whitespace and filter empty strings
                    const fields = line.trim().split(/\s+/).filter(f => f);

                    // Extract fields 1, 2, 5, 6 (0-indexed: 0, 1, 4, 5)
                    if (fields.length >= 6) {
                        matches.push({
                            field1: fields[0],
                            field2: fields[1],
                            field5: fields[4],
                            field6: fields[5],
                            fullLine: line
                        });
                    }
                }
            });

            return matches;
        }

        function displayResults(results) {
            resultsDiv.style.display = 'block';

            if (results.length === 0) {
                outputDiv.innerHTML = '<p>Keine Einträge gefunden</p>';
                return;
            }

            let html = '<table>';
            html += '<thead><tr><th>Datum</th><th>Tag</th><th>Start</th><th>Ende</th></tr></thead>';
            html += '<tbody>';

            results.forEach(result => {
                html += `<tr>
                    <td>${escapeHtml(result.field1)}</td>
                    <td>${escapeHtml(result.field2)}</td>
                    <td>${escapeHtml(result.field5)}</td>
                    <td>${escapeHtml(result.field6)}</td>
                </tr>`;
            });

            html += '</tbody></table>';

            // Build plain text
            let plainText = '';
            results.forEach(result => {
                plainText += `${result.field1} ${result.field2} ${result.field5} ${result.field6}\n`;
            });

            // Show plain text with same info as table
            html += '<pre id="plainText" style="margin-top: 0.75rem;">';
            html += escapeHtml(plainText);
            html += '</pre>';
            html += '<button class="copy-btn" onclick="copyToClipboard()">In Zwischenablage kopieren</button>';

            outputDiv.innerHTML = html;
        }

        function copyToClipboard() {
            const plainText = document.getElementById('plainText').textContent;
            navigator.clipboard.writeText(plainText).then(() => {
                const btn = document.querySelector('.copy-btn');
                const originalText = btn.textContent;
                btn.textContent = 'Kopiert!';
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.textContent = originalText;
                    btn.classList.remove('copied');
                }, 2000);
            }).catch(err => {
                console.error('Fehler beim Kopieren:', err);
                alert('Fehler beim Kopieren in die Zwischenablage');
            });
        }

        function saveResults(results) {
            try {
                const data = {
                    results: results,
                    timestamp: new Date().toISOString()
                };
                localStorage.setItem('anwesenheitszeit_results', JSON.stringify(data));
            } catch (error) {
                console.error('Fehler beim Speichern der Ergebnisse:', error);
            }
        }

        function loadSavedResults() {
            try {
                const saved = localStorage.getItem('anwesenheitszeit_results');
                if (saved) {
                    const data = JSON.parse(saved);
                    displayResults(data.results);
                }
            } catch (error) {
                console.error('Fehler beim Laden der Ergebnisse:', error);
            }
        }

        function showError(message) {
            errorDiv.innerHTML = `<div class="error">${escapeHtml(message)}</div>`;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
