<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Arbeitsplan</title>

    <!-- PWA manifest -->
    <link rel="manifest" href="manifest.json">

    <!-- iOS Safari PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Arbeitsplan">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">

    <!-- Theme colour for browser chrome -->
    <meta name="theme-color" content="#000000">

    <!-- Apply saved theme before paint to avoid flash -->
    <script>(function(){if(localStorage.getItem('colorTheme')!=='light')document.documentElement.setAttribute('data-theme','dark');}());</script>

    <style>
        :root {
            --bg: #f5f5f5;
            --surface: #ffffff;
            --surface-alt: #f8f9fa;
            --border: #dee2e6;
            --border-light: #eee;
            --text: #212529;
            --text-muted: #666;
            --text-subtle: #999;
            --text-heading: #333;
            --past-bg: #e9ecef;
            --past-sep-bg: #e0e3e7;
            --filler-color: #bbb;
            --filler-bg: #f5f5f5;
            --banner-bg: #e9ecef;
            --banner-color: #495057;
            --pill-active-bg: #495057;
            --pill-active-color: #fff;
            --table-font-size: 1rem;
            --heading-font-size: 1.2rem;
            --cell-padding-v: 0.35rem;
            --body-padding: 7px;
        }

        [data-theme="dark"] {
            --bg: #121212;
            --surface: #1e1e1e;
            --surface-alt: #1a1a1a;
            --border: #3a3a3a;
            --border-light: #2e2e2e;
            --text: #e0e0e0;
            --text-muted: #999;
            --text-subtle: #666;
            --text-heading: #ccc;
            --past-bg: #1e1e1e;
            --past-sep-bg: #222;
            --filler-color: #555;
            --filler-bg: #151515;
            --banner-bg: #252525;
            --banner-color: #aaa;
            --pill-active-bg: #555;
            --pill-active-color: #e0e0e0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: var(--body-padding);
            padding-left: max(var(--body-padding), env(safe-area-inset-left));
            padding-right: max(var(--body-padding), env(safe-area-inset-right));
            padding-bottom: max(var(--body-padding), env(safe-area-inset-bottom));
            margin: 0 auto;
            background: var(--bg);
            color: var(--text);
            font-size: 1rem;
        }

        .upload-area {
            text-align: center;
            margin-bottom: 1rem;
        }

        input[type="file"] {
            display: none;
        }

        .btn {
            display: inline-block;
            padding: 0.6rem 1.2rem;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
            width: 100%;
            max-width: 300px;
        }

        .btn:hover {
            background: #0056b3;
        }

        .btn:active {
            transform: scale(0.98);
        }

        #loading {
            display: none;
            text-align: center;
            padding: 0.5rem;
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        #results {
            display: none;
            flex-direction: column;
            gap: 0.5rem;
        }

        #results.visible {
            display: flex;
        }

        #output {
            overflow: hidden;
        }

        #tableWrap {
            overflow: hidden;
        }
        #tableWrap.table-card {
            background: var(--surface-alt);
            border-radius: 10px;
            padding: 0.5rem;
        }

        h2, h3 {
            font-size: var(--heading-font-size);
            margin: 0.5rem 0;
            font-weight: 600;
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            margin-top: 0;
            font-size: var(--table-font-size);
            table-layout: fixed;
        }

        th, td {
            padding: var(--cell-padding-v) 0;
            text-align: left;
        }
        td {
            border-bottom: 1px solid var(--border-light);
        }

        th:first-child, td:first-child {
            text-align: right;
            padding-left: 0.4rem;
        }

        th:not(:last-child), td:not(:last-child) {
            white-space: nowrap;
            padding-right: 1rem;
        }

        td[data-col="pause"] {
            text-align: right;
        }

        td:last-child {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: 0.75em;
        }

        th {
            background: var(--surface-alt);
            font-weight: 600;
            color: var(--text-heading);
            font-size: 0.9rem;
        }

        thead tr th:first-child {
            border-top-left-radius: 6px;
            border-bottom-left-radius: 6px;
        }

        thead tr th:last-child {
            border-top-right-radius: 6px;
            border-bottom-right-radius: 6px;
        }

        tbody::before {
            content: '';
            display: block;
            height: 0.15rem;
        }

        tr:hover {
            background: var(--surface-alt);
        }

        .error {
            background: #fee;
            border: 1px solid #fcc;
            color: #c33;
            padding: 1rem;
            border-radius: 4px;
            margin-bottom: 1rem;
        }

        pre {
            background: var(--surface-alt);
            padding: 0.5rem;
            border-radius: 4px;
            overflow-x: auto;
            margin-top: 0.5rem;
            font-size: 0.75rem;
            line-height: 1.3;
        }

        p {
            margin: 0.3rem 0;
            font-size: 0.9rem;
        }


        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.25rem;
            padding: 0.5rem 0.5rem 0.25rem;
        }

        .upload-icon-btn {
            background: none;
            border: 1px solid var(--border);
            border-radius: 4px;
            cursor: pointer;
            padding: 0.3rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
        }

        .upload-icon-btn:hover {
            background: var(--surface-alt);
            color: var(--text);
        }

        .past-separator td {
            background: var(--past-sep-bg);
            padding: 0.25rem 0.4rem;
            border: none;
            border-radius: 6px;
        }
        .past-separator-inner {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
        }
        /* when expanded, add border around separator and connect to past-day box */
        .past-separator:has(+ tr.past-day.show) td {
            border: 1px solid var(--border);
            border-bottom: none;
            border-bottom-left-radius: 0;
            border-bottom-right-radius: 0;
        }

        .past-separator-label {
            color: var(--text-muted);
            font-size: 0.7rem;
            font-style: italic;
        }

        .settings-accordion-header .past-separator-label {
            font-size: 0.85rem;
            font-weight: 400;
        }

        .toggle-past-link {
            color: var(--text-muted);
            font-size: 0.7rem;
            line-height: 1;
        }

        tr.past-day td {
            max-height: 0;
            padding-top: 0;
            padding-bottom: 0;
            line-height: 0;
            overflow: hidden;
            opacity: 0;
            border: none;
            transition: max-height 0.25s ease, padding 0.25s ease, opacity 0.25s ease, line-height 0.25s ease;
        }

        tr.past-day.show td {
            max-height: 3rem;
            padding-top: var(--cell-padding-v);
            padding-bottom: var(--cell-padding-v);
            line-height: 1.4;
            opacity: 1;
            background: var(--past-bg);
            border-bottom: 1px solid var(--border);
        }

        tr.past-day.show td:first-child { border-left: 1px solid var(--border); }
        tr.past-day.show td:last-child  { border-right: 1px solid var(--border); }

        /* no top border on first past row — separator row is the top of the box */
        tr.past-separator + tr.past-day.show td { border-top: none; }

        /* when collapsed, separator has full rounded corners (already set on .past-separator td) */

        /* rounded bottom corners on last past row */
        tr.past-day.show:not(:has(+ tr.past-day.show)) td:first-child { border-bottom-left-radius: 6px; }
        tr.past-day.show:not(:has(+ tr.past-day.show)) td:last-child  { border-bottom-right-radius: 6px; }

        tr.filler-row td {
            color: var(--filler-color);
            font-size: 0.8rem;
            background: var(--filler-bg);
        }

        tr.filler-row:hover td {
            background: var(--filler-bg);
        }

        tr.past-day.filler-row td {
            background: var(--past-bg);
        }

        tr.past-day.filler-row:hover td {
            background: var(--past-bg);
        }

        .toggle-pill {
            display: inline-flex;
            border: 1px solid var(--border);
            border-radius: 5px;
            overflow: hidden;
            font-size: 0.78rem;
            cursor: pointer;
        }

        .toggle-pill span {
            padding: 0.2rem 0.65rem;
            color: var(--text-subtle);
            transition: background 0.15s, color 0.15s;
            user-select: none;
        }

        .toggle-pill span.active {
            background: var(--pill-active-bg);
            color: var(--pill-active-color);
        }

        .next-shift-banner {
            background: var(--banner-bg);
            border-radius: 8px;
            padding: 0.4rem 0.75rem;
            margin-bottom: 0.5rem;
            font-size: 1rem;
            color: var(--banner-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .alarm-shortcut-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 0.15rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            flex-shrink: 0;
            gap: 0.3rem;
        }

        .alarm-shortcut-btn:hover {
            color: var(--text);
        }

        .alarm-offset-input {
            padding: 0.25rem 0.4rem;
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 0.85rem;
            color: var(--text);
            background: var(--surface);
            text-align: right;
        }

        #alarm-offsets-list {
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.4rem;
            margin-top: 0.4rem;
            margin-bottom: 0.4rem;
        }

        .alarm-offset-item {
            display: flex;
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
        }

        .alarm-offset-item select {
            border: none;
            padding: 0.25rem 1px 0.25rem 0.4rem;
            font-size: 0.85rem;
            color: var(--text);
            background: var(--surface);
            border-right: 1px solid var(--border);
            text-align: right;
        }

        .alarm-offset-item button {
            background: none;
            border: none;
            cursor: pointer;
            padding: 0.15rem 0.4rem;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .alarm-offset-item button:hover {
            background: #fee;
            color: #c33;
        }

        .alarm-offset-add {
            background: none;
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            padding: 0.25rem 0.5rem;
            color: var(--text-heading);
            font-size: 1rem;
            line-height: 1;
        }

        .alarm-offset-add:hover {
            background: var(--surface-alt);
        }

        .meta-text {
            font-weight: normal;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .settings-row {
            margin-top: 0.4rem;
            font-size: 0.9rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        #accordions {
            background: var(--surface);
            border-radius: 4px;
            margin-top: 1rem;
        }

        .settings-accordion-header {
            background: var(--past-sep-bg);
            border: none;
            border-radius: 6px;
            padding: 0.35rem 0.4rem;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
        }

        .settings-accordion-header.open {
            border-bottom-left-radius: 0;
            border-bottom-right-radius: 0;
        }

        .settings-accordion-content {
            border: none;
            border-top: none;
            border-bottom-left-radius: 6px;
            border-bottom-right-radius: 6px;
            overflow: hidden;
            transition: max-height 0.3s ease-out, opacity 0.3s ease-out;
            padding: 0 0.5rem;
        }

        .settings-accordion-content.open {
            max-height: 600px;
            opacity: 1;
        }

        .settings-accordion-content.collapsed {
            max-height: 0;
            opacity: 0;
            padding-top: 0;
            padding-bottom: 0;
        }

        .settings-accordion-content.open > *:last-child {
            margin-bottom: 0.5rem;
        }

        .settings-section-title {
            color: var(--text-muted);
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            padding: 0.6rem 0 0.2rem;
            margin-top: 0.4rem;
        }

        .settings-section-title:first-child {
            margin-top: 0;
        }

        .settings-slider {
            width: 80px;
            accent-color: var(--pill-active-bg);
            flex-shrink: 0;
        }

    </style>
</head>
<body>
    <div class="upload-area" id="uploadArea">
        <input type="file" id="fileInput" accept=".pdf">
        <button class="btn" onclick="document.getElementById('fileInput').click()">PDF hochladen</button>
    </div>

    <div id="loading">Wird verarbeitet...</div>

    <div id="error"></div>

    <div id="results">
        <div id="output"></div>
        <div id="tableWrap"></div>
    </div>
    <div id="accordions"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        // Configure PDF.js worker
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const loading = document.getElementById('loading');
        const resultsDiv = document.getElementById('results');
        const outputDiv = document.getElementById('output');
        const tableWrapDiv = document.getElementById('tableWrap');
        const accordionsDiv = document.getElementById('accordions');
        const errorDiv = document.getElementById('error');

        // Load saved results on page load
        window.addEventListener('DOMContentLoaded', () => {
            applyFontSettings();
            loadSavedResults();
        });

        // Drag and drop handlers

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });

        async function handleFile(file) {
            errorDiv.innerHTML = '';
            resultsDiv.classList.remove('visible');
            tableWrapDiv.innerHTML = '';
            accordionsDiv.innerHTML = '';
            loading.style.display = 'block';

            try {
                const arrayBuffer = await file.arrayBuffer();
                const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;

                const allLines = [];

                // Extract text from all pages
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const textContent = await page.getTextContent();

                    // Group items by line (y-coordinate)
                    const lines = {};
                    textContent.items.forEach(item => {
                        const y = Math.round(item.transform[5]);
                        if (!lines[y]) {
                            lines[y] = [];
                        }
                        lines[y].push({
                            x: item.transform[4],
                            text: item.str
                        });
                    });

                    // Sort lines by y-coordinate (top to bottom)
                    const sortedY = Object.keys(lines).sort((a, b) => b - a);

                    // Collect structured lines preserving x positions
                    for (const y of sortedY) {
                        // Sort items in line by x-coordinate (left to right)
                        lines[y].sort((a, b) => a.x - b.x);
                        allLines.push(lines[y]);
                    }
                }

                // Process the structured lines (grep for "Anwesenheitszeit")
                const data = processText(allLines);
                displayResults(data);
                saveResults(data);

            } catch (error) {
                showError('Fehler beim Verarbeiten der PDF: ' + error.message);
            } finally {
                loading.style.display = 'none';
            }
        }

        function processText(allLines) {
            const matches = [];
            let month = null;

            // Pass 1 — find x-position of "Pause" column header
            let pauseColX = null;
            for (const lineItems of allLines) {
                const pauseItem = lineItems.find(item => item.text === 'Pause');
                if (pauseItem) { pauseColX = pauseItem.x; break; }
            }

            // Pass 2 — extract data
            for (const lineItems of allLines) {
                const line = lineItems.map(i => i.text).join(' ');

                if (line.includes('von:') && line.includes('bis:')) {
                    const vonMatch = line.match(/von:\s*(\d{2}\.\d{2}\.\d{4})/);
                    if (vonMatch) {
                        const dateStr = vonMatch[1]; // e.g., "01.03.2026"
                        const parts = dateStr.split('.');
                        if (parts.length === 3) {
                            const monthNum = parseInt(parts[1], 10);
                            const year = parts[2];
                            const monthNames = ['Januar', 'Februar', 'März', 'April', 'Mai', 'Juni',
                                              'Juli', 'August', 'September', 'Oktober', 'November', 'Dezember'];
                            month = `${monthNames[monthNum - 1]} ${year}`;
                        }
                    }
                }

                if (line.includes('Anwesenheitszeit')) {
                    // Split by whitespace and filter empty strings
                    const fields = line.trim().split(/\s+/).filter(f => f);

                    // Fields: [0]=day, [1]=weekday, [2]="Anwesenheitszeit", [3]="(final)", [4]=von, [5]=bis
                    // Then: numeric fields (Anw, Pause, Istzt, SpätZ, MAZ, Gesamt, Na/So/Ft)
                    // Then: Kommentar (non-numeric, rest of line)
                    if (fields.length >= 6) {
                        const isNumericField = (f) => /^\d+[,]\d+$/.test(f);
                        let i = 6;
                        while (i < fields.length && isNumericField(fields[i])) i++;
                        const kommentar = fields.slice(i).join(' ');

                        // Use x-coordinate matching for Pause to avoid wrong index when break is absent
                        const pauseItem = pauseColX !== null
                            ? lineItems.find(item => item.text.trim() !== '' && Math.abs(item.x - pauseColX) < 25)
                            : null;
                        const pause = pauseItem ? pauseItem.text : '';

                        matches.push({
                            field1: fields[0],
                            field2: fields[1],
                            field5: fields[4],
                            field6: fields[5],
                            arbeitszeit: fields[6] || '',  // Duration (Anw)
                            pause: pause,
                            kommentar: kommentar,
                            fullLine: line
                        });
                    }
                }
            }

            return { matches, month };
        }

        function displayResults(data) {
            resultsDiv.classList.add('visible');
            uploadArea.style.display = 'none';

            const results = data.matches || data.results || data;
            const month = data.month || null;
            const timestamp = data.timestamp || null;

            if (!results || results.length === 0) {
                outputDiv.innerHTML = '<p>Keine Einträge gefunden</p>';
                return;
            }

            const today = new Date();
            today.setHours(0, 0, 0, 0);

            let html = '';
            html += '<div class="header-row">';
            if (month) {
                let monthText = escapeHtml(month);
                if (timestamp) {
                    const date = new Date(timestamp);
                    const day = String(date.getDate()).padStart(2, '0');
                    const monthNum = String(date.getMonth() + 1).padStart(2, '0');
                    monthText += ` <span class="meta-text">(hochgeladen am ${day}.${monthNum}.)</span>`;
                }
                html += `<h3 style="margin: 0;">${monthText}</h3>`;
            } else {
                html += `<h3 style="margin: 0;">Arbeitsplan</h3>`;
            }
            html += `<div style="display:flex;gap:0.4rem;">`;
            html += `<button class="upload-icon-btn" onclick="reloadWithClearCache()" title="Neu laden"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg></button>`;
            html += `<button class="upload-icon-btn" onclick="document.getElementById('fileInput').click()" title="PDF hochladen"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg></button>`;
            html += `</div>`;
            html += '</div>';

            // Extract year and month number from month string (e.g. "März 2026")
            const monthNames = ['Januar', 'Februar', 'März', 'April', 'Mai', 'Juni',
                              'Juli', 'August', 'September', 'Oktober', 'November', 'Dezember'];
            let pdfYear = today.getFullYear();
            let pdfMonthNum = today.getMonth() + 1;
            if (month) {
                const yearMatch = month.match(/\d{4}/);
                if (yearMatch) pdfYear = parseInt(yearMatch[0], 10);
                const monthName = month.replace(/\s*\d{4}$/, '').trim();
                const idx = monthNames.indexOf(monthName);
                if (idx !== -1) pdfMonthNum = idx + 1;
            }

            const decimalDauerOn = localStorage.getItem('formatDauer') === 'true';
            const decimalPauseOn = localStorage.getItem('formatPause') === 'true';

            let pastRows = '';
            let futureRows = '';
            let nextShiftStart = null;
            let prevDay = null;
            let prevIsPast = false;

            results.forEach(result => {
                let isPast = false;
                let rowDay = null;
                if (result.field1) {
                    const dateMatch = result.field1.match(/(\d{1,2})/);
                    if (dateMatch) {
                        rowDay = parseInt(dateMatch[1], 10);
                        const rowDate = new Date(pdfYear, pdfMonthNum - 1, rowDay);
                        rowDate.setHours(0, 0, 0, 0);
                        isPast = rowDate < today;
                    }
                }

                // Insert filler row if there's a gap of at least 1 day
                if (rowDay !== null && prevDay !== null && rowDay - prevDay > 1) {
                    const gapDays = rowDay - prevDay - 1;
                    const label = gapDays === 1 ? '1 Tag frei' : `${gapDays} Tage frei`;
                    const fillerRow = `<tr class="${prevIsPast ? 'past-day filler-row' : 'filler-row'}">
                        <td></td><td colspan="6">${label}</td>
                    </tr>`;
                    if (prevIsPast) pastRows += fillerRow;
                    else futureRows += fillerRow;
                }

                if (!isPast && rowDay && result.field5) {
                    const timeMatch = result.field5.match(/(\d{1,2}):(\d{2})/);
                    if (timeMatch && nextShiftStart === null) {
                        const shiftStart = new Date(pdfYear, pdfMonthNum - 1, rowDay,
                            parseInt(timeMatch[1], 10), parseInt(timeMatch[2], 10), 0, 0);
                        if (shiftStart > new Date()) {
                            nextShiftStart = shiftStart;
                        }
                    }
                }

                const row = `<tr class="${isPast ? 'past-day' : ''}">
                    <td>${escapeHtml(result.field1)}</td>
                    <td>${escapeHtml(result.field2)}</td>
                    <td>${escapeHtml(result.field5)}</td>
                    <td>${escapeHtml(result.field6)}</td>
                    <td data-col="dauer" data-raw="${escapeHtml(result.arbeitszeit || '')}">${escapeHtml(decimalDauerOn ? (result.arbeitszeit || '') : decimalToHm(result.arbeitszeit))}</td>
                    <td data-col="pause" data-raw="${escapeHtml(result.pause || '')}">${escapeHtml(decimalPauseOn ? (result.pause || '') : (result.pause ? decimalToHm(result.pause) : ''))}</td>
                    <td>${escapeHtml(result.kommentar || '')}</td>
                </tr>`;

                if (isPast) pastRows += row;
                else futureRows += row;

                if (rowDay !== null) {
                    prevDay = rowDay;
                    prevIsPast = isPast;
                }
            });

            const bannerOn = localStorage.getItem('showNextShift') !== 'false';
            if (nextShiftStart) {
                html += `<div class="next-shift-banner" id="next-shift-banner" style="${bannerOn ? '' : 'display:none'}">
                    <span id="next-shift-text"></span>
                    <button class="alarm-shortcut-btn" data-shift-ts="${nextShiftStart.getTime()}" onclick="setShiftAlarm(this)" title="Wecker stellen">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="13" r="8"/><path d="M12 9v4l2 2"/><path d="M5 3 2 6"/><path d="m22 6-3-3"/></svg>
                        Wecker stellen
                    </button>
                </div>`;
            }

            const separator = pastRows
                ? `<tr class="past-separator" onclick="togglePastDays()" style="cursor:pointer;"><td colspan="7"><span class="past-separator-inner"><span class="past-separator-label">vergangene Tage ausgeblendet</span><span class="toggle-past-link">▼</span></span></td></tr>`
                : '';

            outputDiv.innerHTML = html;

            let tableHtml = '<table>';
            tableHtml += '<colgroup><col style="width:11%"><col style="width:10%"><col style="width:18%"><col style="width:18%"><col style="width:17%"><col style="width:16%"><col style="width:10%"></colgroup>';
            tableHtml += '<thead><tr><th>Tag</th><th></th><th>Start</th><th>Ende</th><th>Dauer</th><th>Pause</th><th>Info</th></tr></thead>';
            tableHtml += '<tbody>';
            tableHtml += separator + pastRows + futureRows;
            tableHtml += '</tbody></table>';
            tableWrapDiv.innerHTML = tableHtml;
            if (localStorage.getItem('tableCard') === 'true') tableWrapDiv.classList.add('table-card');
            else tableWrapDiv.classList.remove('table-card');
            let accordionsHtml = '';

            // Combined settings accordion
            const settingsCollapsed = localStorage.getItem('settingsSectionCollapsed') !== 'false';
            accordionsHtml += `<div class="settings-accordion-header ${settingsCollapsed ? '' : 'open'}" onclick="toggleSettingsSection()">
                <span class="past-separator-label">Einstellungen</span>
                <span class="toggle-past-link">${settingsCollapsed ? '▼' : '▲'}</span>
            </div>`;
            accordionsHtml += `<div id="settings-accordion" class="settings-accordion-content ${settingsCollapsed ? 'collapsed' : 'open'}">`;

            // Alarm-Zeiten subheading
            accordionsHtml += '<div class="settings-section-title">Alarm-Zeiten</div>';
            accordionsHtml += '<div id="alarm-offsets-list">';
            const alarmOffsets = getAlarmOffsets();
            alarmOffsets.forEach(offset => {
                accordionsHtml += `<div class="alarm-offset-item">
                    <select onchange="saveAlarmOffsetsFromUI()">${buildOffsetOptions(offset)}</select>
                    <button onclick="removeAlarmOffset(this)" title="Entfernen">×</button>
                </div>`;
            });
            accordionsHtml += '<button class="alarm-offset-add" onclick="addAlarmOffset()">+</button>';
            accordionsHtml += '</div>';

            const currentStep = getAlarmOffsetStep();
            accordionsHtml += `<div class="settings-row">
                <select class="alarm-offset-input" onchange="saveAlarmOffsetStep(this.value)">
                    ${[1,5,10,15,30].map(s => `<option value="${s}"${s === currentStep ? ' selected' : ''}>${s} min</option>`).join('')}
                </select>
                <span>Schrittweite</span>
            </div>`;

            // Features subheading
            accordionsHtml += '<div class="settings-section-title">Features</div>';

            const fillerOn = localStorage.getItem('showFillerRows') !== 'false';
            accordionsHtml += '<div class="settings-row">';
            accordionsHtml += '<div class="toggle-pill" onclick="toggleFillerPill(this)">';
            accordionsHtml += `<span class="${fillerOn ? 'active' : ''}">An</span><span class="${fillerOn ? '' : 'active'}">Aus</span>`;
            accordionsHtml += '</div>';
            accordionsHtml += '<span>Zeilen für freie Tage anzeigen</span>';
            accordionsHtml += '</div>';

            const bannerOnSetting = localStorage.getItem('showNextShift') !== 'false';
            accordionsHtml += '<div class="settings-row">';
            accordionsHtml += '<div class="toggle-pill" onclick="toggleBannerPill(this)">';
            accordionsHtml += `<span class="${bannerOnSetting ? 'active' : ''}">An</span><span class="${bannerOnSetting ? '' : 'active'}">Aus</span>`;
            accordionsHtml += '</div>';
            accordionsHtml += '<span>„Nächste Schicht in" anzeigen</span>';
            accordionsHtml += '</div>';

            // Stunden/Minuten-Anzeige subheading
            accordionsHtml += '<div class="settings-section-title">Stunden/Minuten-Anzeige</div>';

            accordionsHtml += '<div class="settings-row">';
            accordionsHtml += '<div class="toggle-pill" onclick="toggleDauerFormat(this)">';
            accordionsHtml += `<span class="${decimalDauerOn ? 'active' : ''}">An</span><span class="${decimalDauerOn ? '' : 'active'}">Aus</span>`;
            accordionsHtml += '</div>';
            accordionsHtml += '<span>Dauer als Dezimalzahl</span>';
            accordionsHtml += '</div>';

            accordionsHtml += '<div class="settings-row">';
            accordionsHtml += '<div class="toggle-pill" onclick="togglePauseFormat(this)">';
            accordionsHtml += `<span class="${decimalPauseOn ? 'active' : ''}">An</span><span class="${decimalPauseOn ? '' : 'active'}">Aus</span>`;
            accordionsHtml += '</div>';
            accordionsHtml += '<span>Pause als Dezimalzahl</span>';
            accordionsHtml += '</div>';

            // Anzeige subheading
            accordionsHtml += '<div class="settings-section-title">Anzeige</div>';

            const darkOn = localStorage.getItem('colorTheme') !== 'light';
            accordionsHtml += '<div class="settings-row">';
            accordionsHtml += '<div class="toggle-pill" onclick="toggleDarkMode(this)">';
            accordionsHtml += `<span class="${darkOn ? 'active' : ''}">An</span><span class="${darkOn ? '' : 'active'}">Aus</span>`;
            accordionsHtml += '</div>';
            accordionsHtml += '<span>Dunkles Design</span>';
            accordionsHtml += '</div>';

            const cardOn = localStorage.getItem('tableCard') === 'true';
            accordionsHtml += '<div class="settings-row">';
            accordionsHtml += '<div class="toggle-pill" onclick="toggleTableCard(this)">';
            accordionsHtml += `<span class="${cardOn ? 'active' : ''}">An</span><span class="${cardOn ? '' : 'active'}">Aus</span>`;
            accordionsHtml += '</div>';
            accordionsHtml += '<span>Tabellen-Karte</span>';
            accordionsHtml += '</div>';

            const tFontIdx = parseInt(localStorage.getItem('tableFontIdx') || '2');
            const hFontIdx = parseInt(localStorage.getItem('headingFontIdx') || '2');
            const bodyPadIdx = parseInt(localStorage.getItem('bodyPaddingIdx') || '1');

            accordionsHtml += `<div class="settings-row"><input type="range" class="settings-slider" min="0" max="3" step="1" value="${tFontIdx}" oninput="saveTableFont(this.value)"><span>Schriftgröße Tabelle</span></div>`;
            accordionsHtml += `<div class="settings-row"><input type="range" class="settings-slider" min="0" max="3" step="1" value="${hFontIdx}" oninput="saveHeadingFont(this.value)"><span>Schriftgröße Überschriften</span></div>`;
            accordionsHtml += `<div class="settings-row"><input type="range" class="settings-slider" min="0" max="3" step="1" value="${bodyPadIdx}" oninput="saveBodyPadding(this.value)"><span>Außenabstand</span></div>`;

            accordionsHtml += '</div>'; // close settings-accordion

            document.getElementById('accordions').innerHTML = accordionsHtml;

            if (localStorage.getItem('showFillerRows') === 'false') {
                document.querySelectorAll('tr.filler-row').forEach(row => row.style.display = 'none');
            }

            if (nextShiftStart) startCountdownTimer(nextShiftStart);
        }

        let countdownInterval = null;

        function startCountdownTimer(shiftStart) {
            if (countdownInterval) clearInterval(countdownInterval);
            updateCountdownPill(shiftStart);
            countdownInterval = setInterval(() => updateCountdownPill(shiftStart), 30000);
        }

        function updateCountdownPill(shiftStart) {
            const banner = document.getElementById('next-shift-banner');
            if (!banner) { clearInterval(countdownInterval); return; }
            const textEl = document.getElementById('next-shift-text');
            if (!textEl) return;
            const ms = shiftStart - Date.now();
            textEl.textContent = ms <= 0 ? 'Nächste Schicht: jetzt' : `Nächste Schicht ${formatCountdown(ms)}`;
        }

        function getAlarmOffsetStep() {
            return parseInt(localStorage.getItem('alarmOffsetStep') || '5', 10);
        }

        function buildOffsetOptions(selected) {
            const step = getAlarmOffsetStep();
            let html = '';
            for (let m = 0; m <= 300; m += step) {
                html += `<option value="${m}"${m === selected ? ' selected' : ''}>${m}</option>`;
            }
            // If selected value isn't in the step grid, add it so it doesn't silently reset
            if (selected % step !== 0 && selected >= 0 && selected <= 300) {
                html += `<option value="${selected}" selected>${selected}</option>`;
            }
            return html;
        }

        function saveAlarmOffsetStep(val) {
            localStorage.setItem('alarmOffsetStep', val);
            // Rebuild all offset selects with new step, snapping values to nearest multiple
            const step = parseInt(val, 10);
            document.querySelectorAll('#alarm-offsets-list select').forEach(sel => {
                const cur = parseInt(sel.value, 10);
                const snapped = Math.min(300, Math.round(cur / step) * step);
                sel.innerHTML = buildOffsetOptions(snapped);
            });
            saveAlarmOffsetsFromUI();
        }

        function getAlarmOffsets() {
            try {
                const saved = localStorage.getItem('alarmOffsets');
                if (saved) {
                    const parsed = JSON.parse(saved);
                    if (Array.isArray(parsed) && parsed.length > 0) return parsed;
                }
            } catch (e) {}
            return [30];
        }

        function saveAlarmOffsetsFromUI() {
            const selects = document.querySelectorAll('#alarm-offsets-list select');
            const offsets = Array.from(selects)
                .map(s => parseInt(s.value, 10))
                .filter(v => !isNaN(v) && v >= 0);
            localStorage.setItem('alarmOffsets', JSON.stringify(offsets));
        }

        function addAlarmOffset() {
            const list = document.getElementById('alarm-offsets-list');
            const selects = list.querySelectorAll('select');
            const lastVal = selects.length > 0 ? parseInt(selects[selects.length - 1].value, 10) : 15;
            const rawNew = (isNaN(lastVal) ? 15 : lastVal) + 15;
            const newVal = Math.min(300, Math.round(rawNew / 5) * 5);
            const div = document.createElement('div');
            div.className = 'alarm-offset-item';
            div.innerHTML = `<select onchange="saveAlarmOffsetsFromUI()">${buildOffsetOptions(newVal)}</select>
                <button onclick="removeAlarmOffset(this)" title="Entfernen">×</button>`;
            const addButton = list.querySelector('.alarm-offset-add');
            list.insertBefore(div, addButton);
            saveAlarmOffsetsFromUI();
        }

        function removeAlarmOffset(btn) {
            btn.closest('.alarm-offset-item').remove();
            saveAlarmOffsetsFromUI();
        }

        function setShiftAlarm(btn) {
            const shiftTs = parseInt(btn.dataset.shiftTs);
            const offsets = getAlarmOffsets();
            const times = offsets.map(offset => {
                const alarmTime = new Date(shiftTs - offset * 60 * 1000);
                const hh = String(alarmTime.getHours()).padStart(2, '0');
                const mm = String(alarmTime.getMinutes()).padStart(2, '0');
                return hh + ':' + mm;
            });
            window.location.href = `shortcuts://run-shortcut?name=PWA%20Alarm&input=text&text=${encodeURIComponent(times.join(','))}`;
        }

        function formatCountdown(ms) {
            const totalMinutes = Math.floor(ms / 60000);
            const days = Math.floor(totalMinutes / 1440);
            const hours = Math.floor((totalMinutes % 1440) / 60);
            const mins = totalMinutes % 60;
            if (days >= 1) {
                const half = hours >= 12 ? 0.5 : 0;
                const total = days + half;
                return total === 1 ? 'in 1 Tag' : `in ${total} Tagen`;
            }
            if (hours > 0) return `in ${hours}h ${mins}m`;
            return `in ${mins}m`;
        }

        function decimalToHm(val) {
            if (!val || val === '-') return val || '-';
            const num = parseFloat(val.replace(',', '.'));
            if (isNaN(num)) return val;
            const h = Math.floor(num);
            const m = Math.round((num - h) * 60);
            if (h > 0 && m > 0) return `${h}h ${m}m`;
            if (h > 0) return `${h}h`;
            if (m > 0) return `${m}m`;
            return val;
        }

        function toggleDauerFormat(pill) {
            const [on, off] = pill.querySelectorAll('span');
            const isOn = on.classList.contains('active');
            on.classList.toggle('active', !isOn);
            off.classList.toggle('active', isOn);
            localStorage.setItem('formatDauer', isOn ? 'false' : 'true');
            document.querySelectorAll('td[data-col="dauer"]').forEach(td => {
                td.textContent = !isOn ? (td.dataset.raw || '') : decimalToHm(td.dataset.raw);
            });
        }

        function togglePauseFormat(pill) {
            const [on, off] = pill.querySelectorAll('span');
            const isOn = on.classList.contains('active');
            on.classList.toggle('active', !isOn);
            off.classList.toggle('active', isOn);
            localStorage.setItem('formatPause', isOn ? 'false' : 'true');
            document.querySelectorAll('td[data-col="pause"]').forEach(td => {
                td.textContent = !isOn ? (td.dataset.raw || '') : (td.dataset.raw ? decimalToHm(td.dataset.raw) : '');
            });
        }

        function toggleFillerPill(pill) {
            const [on, off] = pill.querySelectorAll('span');
            const isOn = on.classList.contains('active');
            on.classList.toggle('active', !isOn);
            off.classList.toggle('active', isOn);
            document.querySelectorAll('tr.filler-row').forEach(row => {
                row.style.display = isOn ? 'none' : '';
            });
            localStorage.setItem('showFillerRows', isOn ? 'false' : 'true');
        }

        function toggleTableCard(pill) {
            const [on, off] = pill.querySelectorAll('span');
            const isOn = on.classList.contains('active');
            on.classList.toggle('active', !isOn);
            off.classList.toggle('active', isOn);
            const wrap = document.getElementById('tableWrap');
            if (wrap) wrap.classList.toggle('table-card', !isOn);
            localStorage.setItem('tableCard', isOn ? 'false' : 'true');
        }

        function toggleBannerPill(pill) {
            const [on, off] = pill.querySelectorAll('span');
            const isOn = on.classList.contains('active');
            on.classList.toggle('active', !isOn);
            off.classList.toggle('active', isOn);
            const banner = document.getElementById('next-shift-banner');
            if (banner) banner.style.display = isOn ? 'none' : '';
            localStorage.setItem('showNextShift', isOn ? 'false' : 'true');
        }

        function toggleDarkMode(pill) {
            const [on, off] = pill.querySelectorAll('span');
            const isOn = on.classList.contains('active');
            on.classList.toggle('active', !isOn);
            off.classList.toggle('active', isOn);
            if (!isOn) {
                document.documentElement.setAttribute('data-theme', 'dark');
                localStorage.setItem('colorTheme', 'dark');
            } else {
                document.documentElement.removeAttribute('data-theme');
                localStorage.setItem('colorTheme', 'light');
            }
        }

        function toggleSettingsSection() {
            const section = document.getElementById('settings-accordion');
            const header = section.previousElementSibling;
            const arrow = header.querySelector('.toggle-past-link');
            const isOpen = section.classList.contains('open');
            section.classList.toggle('open', !isOpen);
            section.classList.toggle('collapsed', isOpen);
            header.classList.toggle('open', !isOpen);
            arrow.textContent = isOpen ? '▼' : '▲';
            localStorage.setItem('settingsSectionCollapsed', isOpen ? 'true' : 'false');
        }

        function togglePastDays() {
            const pastRows = document.querySelectorAll('tr.past-day');
            const btn = document.querySelector('.toggle-past-link');
            const label = document.querySelector('.past-separator-label');
            const isShowing = pastRows.length > 0 && pastRows[0].classList.contains('show');

            pastRows.forEach(row => row.classList.toggle('show', !isShowing));
            btn.textContent = isShowing ? '▼' : '▲';
            label.textContent = isShowing ? 'vergangene Tage ausgeblendet' : 'vergangene Tage';
        }

        function saveResults(data) {
            try {
                const savedData = {
                    matches: data.matches || data.results || data,
                    month: data.month || null,
                    timestamp: new Date().toISOString()
                };
                localStorage.setItem('anwesenheitszeit_results', JSON.stringify(savedData));
            } catch (error) {
                console.error('Fehler beim Speichern der Ergebnisse:', error);
            }
        }

        function loadSavedResults() {
            try {
                const saved = localStorage.getItem('anwesenheitszeit_results');
                if (saved) {
                    const data = JSON.parse(saved);
                    displayResults(data);
                }
            } catch (error) {
                console.error('Fehler beim Laden der Ergebnisse:', error);
            }
        }

        function showError(message) {
            errorDiv.innerHTML = `<div class="error">${escapeHtml(message)}</div>`;
        }

        function reloadWithClearCache() {
            location.reload();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        const TABLE_FONT_SIZES   = ['0.8rem', '0.9rem', '1rem', '1.1rem'];
        const HEADING_FONT_SIZES = ['1rem', '1.2rem', '1.4rem', '1.6rem'];
        const BODY_PADDINGS      = ['3px', '7px', '12px', '18px'];

        function applyFontSettings() {
            const tIdx = parseInt(localStorage.getItem('tableFontIdx') || '2');
            const hIdx = parseInt(localStorage.getItem('headingFontIdx') || '2');
            const pIdx = parseInt(localStorage.getItem('bodyPaddingIdx') || '1');
            document.documentElement.style.setProperty('--table-font-size', TABLE_FONT_SIZES[tIdx]);
            document.documentElement.style.setProperty('--heading-font-size', HEADING_FONT_SIZES[hIdx]);
            document.documentElement.style.setProperty('--body-padding', BODY_PADDINGS[pIdx]);
        }

        function saveTableFont(idx) {
            localStorage.setItem('tableFontIdx', idx);
            document.documentElement.style.setProperty('--table-font-size', TABLE_FONT_SIZES[idx]);
        }

        function saveHeadingFont(idx) {
            localStorage.setItem('headingFontIdx', idx);
            document.documentElement.style.setProperty('--heading-font-size', HEADING_FONT_SIZES[idx]);
        }

        function saveBodyPadding(idx) {
            localStorage.setItem('bodyPaddingIdx', idx);
            document.documentElement.style.setProperty('--body-padding', BODY_PADDINGS[idx]);
        }

        // Register service worker for PWA / offline support
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(() => {});
            });
        }
    </script>
</body>
</html>
