<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arbeitsplan</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 0.5rem;
            margin: 0 auto;
            background: #f5f5f5;
            font-size: 0.9rem;
        }

        .upload-area {
            text-align: center;
            margin-bottom: 1rem;
        }

        input[type="file"] {
            display: none;
        }

        .btn {
            display: inline-block;
            padding: 0.6rem 1.2rem;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
            width: 100%;
            max-width: 300px;
        }

        .btn:hover {
            background: #0056b3;
        }

        .btn:active {
            transform: scale(0.98);
        }

        #loading {
            display: none;
            text-align: center;
            padding: 0.5rem;
            color: #666;
            font-size: 0.85rem;
        }

        #results {
            background: white;
            border-radius: 4px;
            padding: 0.75rem;
            display: none;
        }

        h2, h3 {
            font-size: 1rem;
            margin: 0.5rem 0;
            font-weight: 600;
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            margin-top: 0.5rem;
            font-size: 0.85rem;
        }

        th, td {
            padding: 0.4rem;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        th:first-child, td:first-child {
            text-align: right;
        }

        th:not(:last-child), td:not(:last-child) {
            width: 1%;
            white-space: nowrap;
            padding-right: 1rem;
        }

        th {
            background: #f8f9fa;
            font-weight: 600;
            color: #333;
            font-size: 0.8rem;
        }

        tr:hover {
            background: #f8f9fa;
        }

        .error {
            background: #fee;
            border: 1px solid #fcc;
            color: #c33;
            padding: 1rem;
            border-radius: 4px;
            margin-bottom: 1rem;
        }

        pre {
            background: #f4f4f4;
            padding: 0.5rem;
            border-radius: 4px;
            overflow-x: auto;
            margin-top: 0.5rem;
            font-size: 0.75rem;
            line-height: 1.3;
        }

        p {
            margin: 0.3rem 0;
            font-size: 0.85rem;
        }

        .copy-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.4rem 0.8rem;
            background: #4caf72;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            margin-top: 0.25rem;
        }

        .copy-btn:hover {
            background: #3d9e62;
        }

        .copy-btn:active {
            transform: scale(0.98);
        }

        .copy-btn.copied {
            background: #6c757d;
        }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        .upload-icon-btn {
            background: none;
            border: 1px solid #dee2e6;
            border-radius: 4px;
            cursor: pointer;
            padding: 0.3rem;
            color: #6c757d;
            display: flex;
            align-items: center;
        }

        .upload-icon-btn:hover {
            background: #f8f9fa;
            color: #343a40;
        }

        .past-separator td {
            background: #d0d4d9;
            padding: 0.15rem 0.4rem;
            border-top: 1px solid #dee2e6;
            border-left: 1px solid #dee2e6;
            border-right: 1px solid #dee2e6;
            border-bottom: 1px solid #dee2e6;
            border-top-left-radius: 6px;
            border-top-right-radius: 6px;
        }

        .past-separator-inner {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .past-separator-label {
            color: #6c757d;
            font-size: 0.8rem;
        }

        .toggle-past-link {
            background: none;
            border: none;
            cursor: pointer;
            color: #6c757d;
            font-size: 0.85rem;
            padding: 0;
            line-height: 1;
        }

        .toggle-past-link:hover {
            color: #343a40;
        }

        tr.past-day td {
            max-height: 0;
            padding-top: 0;
            padding-bottom: 0;
            line-height: 0;
            overflow: hidden;
            opacity: 0;
            border: none;
            transition: max-height 0.25s ease, padding 0.25s ease, opacity 0.25s ease, line-height 0.25s ease;
        }

        tr.past-day.show td {
            max-height: 3rem;
            padding-top: 0.4rem;
            padding-bottom: 0.4rem;
            line-height: 1.4;
            opacity: 1;
            background: #e9ecef;
            border-bottom: 1px solid #dee2e6;
        }

        tr.past-day.show td:first-child { border-left: 1px solid #dee2e6; }
        tr.past-day.show td:last-child  { border-right: 1px solid #dee2e6; }

        /* no top border on first past row — separator row is the top of the box */
        tr.past-separator + tr.past-day.show td { border-top: none; }

        /* when collapsed, round the bottom corners of the separator too */
        tr.past-separator:not(:has(+ tr.past-day.show)) td {
            border-bottom-left-radius: 6px;
            border-bottom-right-radius: 6px;
        }

        /* rounded bottom corners on last past row */
        tr.past-day.show:not(:has(+ tr.past-day.show)) td:first-child { border-bottom-left-radius: 6px; }
        tr.past-day.show:not(:has(+ tr.past-day.show)) td:last-child  { border-bottom-right-radius: 6px; }

    </style>
</head>
<body>
    <div class="upload-area" id="uploadArea">
        <input type="file" id="fileInput" accept=".pdf">
        <button class="btn" onclick="document.getElementById('fileInput').click()">PDF hochladen</button>
    </div>

    <div id="loading">Wird verarbeitet...</div>

    <div id="error"></div>

    <div id="results">
        <div id="output"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        // Configure PDF.js worker
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const loading = document.getElementById('loading');
        const resultsDiv = document.getElementById('results');
        const outputDiv = document.getElementById('output');
        const errorDiv = document.getElementById('error');

        // Load saved results on page load
        window.addEventListener('DOMContentLoaded', () => {
            loadSavedResults();
        });

        // Drag and drop handlers

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });

        async function handleFile(file) {
            errorDiv.innerHTML = '';
            resultsDiv.style.display = 'none';
            loading.style.display = 'block';

            try {
                const arrayBuffer = await file.arrayBuffer();
                const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;

                let allText = '';

                // Extract text from all pages
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const textContent = await page.getTextContent();

                    // Group items by line (y-coordinate)
                    const lines = {};
                    textContent.items.forEach(item => {
                        const y = Math.round(item.transform[5]);
                        if (!lines[y]) {
                            lines[y] = [];
                        }
                        lines[y].push({
                            x: item.transform[4],
                            text: item.str
                        });
                    });

                    // Sort lines by y-coordinate (top to bottom)
                    const sortedY = Object.keys(lines).sort((a, b) => b - a);

                    // Build text with layout
                    for (const y of sortedY) {
                        // Sort items in line by x-coordinate (left to right)
                        lines[y].sort((a, b) => a.x - b.x);
                        const lineText = lines[y].map(item => item.text).join(' ');
                        allText += lineText + '\n';
                    }
                }

                // Process the text (grep for "Anwesenheitszeit")
                const data = processText(allText);
                displayResults(data);
                saveResults(data);

            } catch (error) {
                showError('Fehler beim Verarbeiten der PDF: ' + error.message);
            } finally {
                loading.style.display = 'none';
            }
        }

        function processText(text) {
            const lines = text.split('\n');
            const matches = [];
            let month = null;

            // Extract month from "von: ... bis: ..." line
            lines.forEach(line => {
                if (line.includes('von:') && line.includes('bis:')) {
                    // Extract date after "von:"
                    const vonMatch = line.match(/von:\s*(\d{2}\.\d{2}\.\d{4})/);
                    if (vonMatch) {
                        const dateStr = vonMatch[1]; // e.g., "01.03.2026"
                        const parts = dateStr.split('.');
                        if (parts.length === 3) {
                            const monthNum = parseInt(parts[1], 10);
                            const year = parts[2];
                            const monthNames = ['Januar', 'Februar', 'März', 'April', 'Mai', 'Juni',
                                              'Juli', 'August', 'September', 'Oktober', 'November', 'Dezember'];
                            month = `${monthNames[monthNum - 1]} ${year}`;
                        }
                    }
                }

                if (line.includes('Anwesenheitszeit')) {
                    // Split by whitespace and filter empty strings
                    const fields = line.trim().split(/\s+/).filter(f => f);

                    // Fields: [0]=day, [1]=weekday, [2]="Anwesenheitszeit", [3]="(final)", [4]=von, [5]=bis
                    // Then: numeric fields (Anw, Pause, Istzt, SpätZ, MAZ, Gesamt, Na/So/Ft)
                    // Then: Kommentar (non-numeric, rest of line)
                    if (fields.length >= 6) {
                        const isNumericField = (f) => /^\d+[,]\d+$/.test(f);
                        let i = 6;
                        while (i < fields.length && isNumericField(fields[i])) i++;
                        const kommentar = fields.slice(i).join(' ');

                        matches.push({
                            field1: fields[0],
                            field2: fields[1],
                            field5: fields[4],
                            field6: fields[5],
                            kommentar: kommentar,
                            fullLine: line
                        });
                    }
                }
            });

            return { matches, month };
        }

        function displayResults(data) {
            resultsDiv.style.display = 'block';
            uploadArea.style.display = 'none';

            const results = data.matches || data.results || data;
            const month = data.month || null;
            const timestamp = data.timestamp || null;

            if (!results || results.length === 0) {
                outputDiv.innerHTML = '<p>Keine Einträge gefunden</p>';
                return;
            }

            const today = new Date();
            today.setHours(0, 0, 0, 0);

            let html = '';
            html += '<div class="header-row">';
            if (month) {
                let monthText = escapeHtml(month);
                if (timestamp) {
                    const date = new Date(timestamp);
                    const day = String(date.getDate()).padStart(2, '0');
                    const monthNum = String(date.getMonth() + 1).padStart(2, '0');
                    monthText += ` <span style="font-weight: normal; font-size: 0.85rem; color: #666;">(hochgeladen am ${day}.${monthNum}.)</span>`;
                }
                html += `<h3 style="margin: 0;">${monthText}</h3>`;
            } else {
                html += `<h3 style="margin: 0;">Arbeitsplan</h3>`;
            }
            html += `<button class="upload-icon-btn" onclick="document.getElementById('fileInput').click()" title="PDF hochladen"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg></button>`;
            html += '</div>';
            html += '<table>';
            html += '<thead><tr><th>Datum</th><th>Tag</th><th>Start</th><th>Ende</th><th>Kommentar</th></tr></thead>';
            html += '<tbody>';

            // Extract year and month number from month string (e.g. "März 2026")
            const monthNames = ['Januar', 'Februar', 'März', 'April', 'Mai', 'Juni',
                              'Juli', 'August', 'September', 'Oktober', 'November', 'Dezember'];
            let pdfYear = today.getFullYear();
            let pdfMonthNum = today.getMonth() + 1;
            if (month) {
                const yearMatch = month.match(/\d{4}/);
                if (yearMatch) pdfYear = parseInt(yearMatch[0], 10);
                const monthName = month.replace(/\s*\d{4}$/, '').trim();
                const idx = monthNames.indexOf(monthName);
                if (idx !== -1) pdfMonthNum = idx + 1;
            }

            let pastRows = '';
            let futureRows = '';

            results.forEach(result => {
                let isPast = false;
                if (result.field1) {
                    const dateMatch = result.field1.match(/(\d{1,2})/);
                    if (dateMatch) {
                        const day = parseInt(dateMatch[1], 10);
                        const rowDate = new Date(pdfYear, pdfMonthNum - 1, day);
                        rowDate.setHours(0, 0, 0, 0);
                        isPast = rowDate < today;
                    }
                }

                const row = `<tr class="${isPast ? 'past-day' : ''}">
                    <td>${escapeHtml(result.field1)}</td>
                    <td>${escapeHtml(result.field2)}</td>
                    <td>${escapeHtml(result.field5)}</td>
                    <td>${escapeHtml(result.field6)}</td>
                    <td>${escapeHtml(result.kommentar || '')}</td>
                </tr>`;

                if (isPast) pastRows += row;
                else futureRows += row;
            });

            const separator = pastRows
                ? `<tr class="past-separator"><td colspan="5"><span class="past-separator-inner"><span class="past-separator-label">vergangene Tage ausgeblendet</span><button class="toggle-past-link" onclick="togglePastDays()">▼</button></span></td></tr>`
                : '';

            html += separator + pastRows + futureRows;
            html += '</tbody></table>';

            // Build plain text for clipboard
            let plainText = '';
            results.forEach(result => {
                const line = `${result.field1} ${result.field2} ${result.field5} ${result.field6}`;
                plainText += result.kommentar ? `${line} ${result.kommentar}\n` : `${line}\n`;
            });

            html += `<div id="plainText" style="display:none">${escapeHtml(plainText)}</div>`;
            html += '<button class="copy-btn" style="margin-top:0.75rem;" onclick="copyToClipboard()"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>Als Text kopieren</button>';

            outputDiv.innerHTML = html;
        }

        function copyToClipboard() {
            const plainText = document.getElementById('plainText').textContent;
            navigator.clipboard.writeText(plainText).then(() => {
                const btn = document.querySelector('.copy-btn');
                const originalText = btn.textContent;
                btn.textContent = 'Kopiert!';
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.textContent = originalText;
                    btn.classList.remove('copied');
                }, 2000);
            }).catch(err => {
                console.error('Fehler beim Kopieren:', err);
                alert('Fehler beim Kopieren in die Zwischenablage');
            });
        }

        function togglePastDays() {
            const pastRows = document.querySelectorAll('tr.past-day');
            const btn = document.querySelector('.toggle-past-link');
            const label = document.querySelector('.past-separator-label');
            const isShowing = pastRows.length > 0 && pastRows[0].classList.contains('show');

            pastRows.forEach(row => row.classList.toggle('show', !isShowing));
            btn.textContent = isShowing ? '▼' : '▲';
            label.textContent = isShowing ? 'vergangene Tage ausgeblendet' : 'vergangene Tage';
        }

        function saveResults(data) {
            try {
                const savedData = {
                    matches: data.matches || data.results || data,
                    month: data.month || null,
                    timestamp: new Date().toISOString()
                };
                localStorage.setItem('anwesenheitszeit_results', JSON.stringify(savedData));
            } catch (error) {
                console.error('Fehler beim Speichern der Ergebnisse:', error);
            }
        }

        function loadSavedResults() {
            try {
                const saved = localStorage.getItem('anwesenheitszeit_results');
                if (saved) {
                    const data = JSON.parse(saved);
                    displayResults(data);
                }
            } catch (error) {
                console.error('Fehler beim Laden der Ergebnisse:', error);
            }
        }

        function showError(message) {
            errorDiv.innerHTML = `<div class="error">${escapeHtml(message)}</div>`;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
